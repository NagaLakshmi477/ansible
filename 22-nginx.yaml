- name: install nginx
  hosts: roboshop_frontend
  become: yes
  serial: 2
  tasks:
  - name: install nginx
    ansible.builtin.dnf:
      name: nginx
      state: installed
  
  - name: start and enable nginx
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: yes
