- name: install nginx
  hosts: frontend
  become: yes
  tasks:
  - name: install nginx if Redhat
    ansible.builtin.dnf:
      name: nginx
      state: present
    when: ansible_os_family == "RedHat"
  

  - name: install nginx if debian
    ansible.builtin.yum:
      name: nginx
      state: present
    when: ansible_os_family == "Debian"