- name: functions in ansible
  hosts: local
  connection: local
  vars:
    persons: "ramesh, suresh, madhu"
  tasks:
  - name: printing the functions in ansible
    ansible.builtin.debug:
      msg: " my name is {{ person | default('Nagalakshmi') }}"

  - name: printing the person names
    ansible.builtin.debug:
      msg: " {{ persons | split(',')}}"

  - name: convert dict to list
    vars:
      course:
        title: devops
        time: 180hr

    ansible.builtin.debug:
      msg: "{{ course | dict2items}}"

  - name: convert list to dict
    vars:
      names:
        - { 'name': 'ramesh', 'gender': 'male'}
        - { 'name': 'lakshmi', 'gender': 'female'}
        - { 'name': 'madhu', 'gender': 'male'}
    ansible.builtin.debug:
      msg: "{{ names | items2dict }}"
